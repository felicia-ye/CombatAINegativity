<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <style>
      body { font-family: Arial, sans-serif; width: 320px; padding: 12px; }
      button { margin-top: 8px; cursor: pointer; width: 100%; padding: 8px; }
      textarea { width: 100%; box-sizing: border-box; }
      .link-container { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
      a { color: #0066cc; text-decoration: none; cursor: pointer; font-size: 14px; }
      a:hover { text-decoration: underline; }
      #result { margin-top: 15px; }
    </style>
  </head>
  <body>
    <h3>Combat AI</h3>
    <textarea id="input" rows="5" placeholder="Paste or select text here..."></textarea>

    <button id="getText">Get Selected Text</button>
    <button id="analyze">Run Local Analysis</button>
    <button id="aiAnalyze">Ask AI for Second Opinion</button>

    <div id="result"></div>

    <div class="link-container">
      <a id="search">Verify on Google</a>
      <a id="news">Check news sources</a>
      <a id="factcheck">Look for fact-checks</a>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
